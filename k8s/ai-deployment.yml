apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
  labels:
    name: ai-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      name: ai-server
  template:
    metadata:
      labels:
        name: ai-server
    spec:
      containers:
        - image: ai-orchestration
          name: ai-server
          resources:
            requests:
              cpu: "250m"
              memory: "256M"
            limits:
              cpu: "500m"
              memory: "512M"
          env:
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: MISTRAL_API_KEY
          livenessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10

          ports:
            - containerPort: 5000
              name: ai-server-port
