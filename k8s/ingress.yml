apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeforge-ingress
  labels:
    app.kubernetes.io/name: codeforge-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - pathType: Prefix
        path: "/api/sandbox"
        backend:
          service:
            name: sandbox-service
            port: 
              number: 80
